<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">DeepReport workflow diagram</title>
  <desc id="desc">A clean glass-style diagram showing the DeepReport workflow from academic data to generated research ideas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf7f7"/>
      <stop offset="0.48" stop-color="#f7fbfa"/>
      <stop offset="1" stop-color="#eef0fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#008d98"/>
      <stop offset="1" stop-color="#6d63a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#213136" flood-opacity="0.18"/>
    </filter>
    <style>
      .card{fill:rgba(255,255,255,.66);stroke:rgba(88,119,126,.26);stroke-width:1.4;filter:url(#shadow)}
      .soft{fill:rgba(255,255,255,.42);stroke:rgba(88,119,126,.18);stroke-width:1}
      .label{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#101517}
      .small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#607076}
      .micro{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#008d98}
      .line{stroke:url(#accent);stroke-width:3;stroke-linecap:round;fill:none;opacity:.75}
      .dot{fill:url(#accent)}
    </style>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <path d="M120 116C274 42 378 138 514 102c120-31 224-105 366-43 142 63 184 208 131 337-53 128-203 181-356 151-151-29-241-70-382-21-133 46-247-7-276-125-29-119 18-234 123-285Z" fill="#ffffff" opacity=".42"/>
  <text x="80" y="82" class="micro">DEEPREPORT WORKFLOW</text>
  <text x="80" y="122" class="label" font-size="34">From literature scale to research ideas</text>
  <text x="80" y="154" class="small">Academic big data, concept graphs, temporal prediction, and LLM verbalization.</text>

  <rect class="card" x="78" y="230" width="188" height="142" rx="18"/>
  <text x="108" y="280" class="label">Retrieve</text>
  <text x="108" y="314" class="small">Papers and</text>
  <text x="108" y="338" class="small">academic entities</text>
  <circle class="dot" cx="218" cy="274" r="8"/>
  <circle class="dot" cx="198" cy="326" r="5" opacity=".55"/>

  <path class="line" d="M286 301H384"/>
  <circle class="dot" cx="384" cy="301" r="5"/>

  <rect class="card" x="404" y="206" width="220" height="190" rx="18"/>
  <text x="434" y="256" class="label">Structure</text>
  <text x="434" y="290" class="small">Evolving concept</text>
  <text x="434" y="314" class="small">co-occurrence graph</text>
  <line class="line" x1="456" y1="350" x2="544" y2="326"/>
  <line class="line" x1="492" y1="358" x2="568" y2="358"/>
  <circle class="dot" cx="456" cy="350" r="7"/>
  <circle class="dot" cx="544" cy="326" r="7"/>
  <circle class="dot" cx="568" cy="358" r="7"/>
  <circle class="dot" cx="492" cy="358" r="7"/>

  <path class="line" d="M644 301H742"/>
  <circle class="dot" cx="742" cy="301" r="5"/>

  <rect class="card" x="762" y="230" width="190" height="142" rx="18"/>
  <text x="792" y="280" class="label">Predict</text>
  <text x="792" y="314" class="small">Temporal links and</text>
  <text x="792" y="338" class="small">hidden relations</text>

  <path class="line" d="M972 301H1070"/>
  <circle class="dot" cx="1070" cy="301" r="5"/>

  <rect class="card" x="850" y="432" width="270" height="118" rx="18"/>
  <text x="880" y="482" class="label">Generate</text>
  <text x="880" y="516" class="small">Readable, actionable</text>
  <text x="880" y="540" class="small">research ideas</text>
  <path class="line" d="M1084 372C1108 400 1108 418 1084 432"/>

  <rect class="soft" x="80" y="440" width="640" height="88" rx="18"/>
  <text x="112" y="493" class="small">Human researchers inspect, compare, reject, refine, and design experiments.</text>
</svg>
