name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build static site
        run: |
          python scripts/build_site.py
          python scripts/generate_media_manifest.py
      - name: Archive processed markdown & commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Move newly published markdown (top-level content/posts/*.md) into the
          # archive subfolder. The example template is never moved, and the build
          # still reads archive/ on every run, so the pages keep regenerating.
          mkdir -p content/posts/archive
          shopt -s nullglob
          for f in content/posts/*.md; do
            base="$(basename "$f")"
            [ "$base" = "example.md" ] && continue
            case "$base" in
              *.en.md) continue ;;
            esac
            stem="${base%.md}"
            companion="content/posts/${stem}.en.md"
            git mv -f "$f" "content/posts/archive/$base" 2>/dev/null || mv -f "$f" "content/posts/archive/$base"
            if [ -f "$companion" ]; then
              git mv -f "$companion" "content/posts/archive/${stem}.en.md" 2>/dev/null || mv -f "$companion" "content/posts/archive/${stem}.en.md"
            fi
          done
          git add -A data/media-cdn.json content/posts
          if ! git diff --cached --quiet; then
            git commit -m "Archive markdown posts & update media manifest [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
